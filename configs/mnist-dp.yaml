dataset:
  name: mnist
  root: data
  download: true
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  augment: false

model:
  name: mnist_cnn
  num_classes: 10
  width: 32
  dropout: 0.0

optimizer:
  name: sgd
  lr: 0.05
  momentum: 0.9
  weight_decay: 0.0
  nesterov: false

scheduler:
  name: cosine
  warmup_epochs: 5
  min_lr: 5.0e-4

privacy:
  enabled: true
  noise_multiplier: 1.1
  max_grad_norm: 1.0
  delta: 1.0e-5
  poisson_sampling: true
  clipping: flat
  grad_sample_mode: hooks
  secure_mode: false

runtime:
  device: auto
  compile: false
  allow_tf32: true
  channels_last: true
  amp: false
  deterministic: false

training:
  epochs: 40
  batch_size: 512
  eval_batch_size: 1024
  seed: 42
  log_every: 20
  output_dir: results
  experiment_name: mnist-dp-sgd
